name: CI
on: pull_request
jobs:
  guardrails:
    uses: blueworx-io/bluegroup_core_foundation/.github/workflows/ci-wordpress.yml@main
    with:
      # Playwright boots the plugin's DB-free PHP preview via its webServer config
      # (see playwright.config.js) and runs against it — no deployed staging site.
      # This URL must match the webServer URL in playwright.config.js.
      preview_url: http://127.0.0.1:8124/preview/
      plugin_slug: blueworx-labs-clubhouse
