name: CI
on: pull_request
jobs:
  guardrails:
    uses: blueworx-io/bluegroup_core_foundation/.github/workflows/ci-wordpress.yml@main
    with:
      # Tests run against a disposable real WordPress the run provisions itself
      # (PHP + SQLite, no Docker). The DB-free PHP preview is still exercised:
      # playwright.config.js defines two projects, and the @preview specs — which
      # drive preview-only affordances — target the preview server it boots. So a
      # single run covers both harnesses, each with the specs it can actually serve.
      use_local_wordpress: true
      plugin_slug: blueworx-labs-clubhouse

  # Builds the real deployment artifact and fails if anything outside the
  # allowlist reaches it — chiefly preview/index.php, which defines its own
  # ABSPATH and would be reachable unauthenticated on a live club site. The zip
  # is assembled by hand at release time; this is what stops the allowlist being
  # a thing someone has to remember.
  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and verify the deployable zip
        run: bash bin/build-zip.sh "$RUNNER_TEMP/dist"
